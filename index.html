<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>心靈對話 | 深刻認識一個人</title>
    <style>
        :root {
            --bg-warm: #fdfaf7;
            --text-main: #4a4a4a;
            --accent-soft: #d4a373;
            --shadow-soft: rgba(180, 160, 140, 0.12);
            --danger-soft: #d88c8c;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        body {
            margin: 0;
            background: linear-gradient(135deg, #fdfaf7 0%, #e8f0f2 100%);
            font-family: "PingFang TC", "Hiragino Sans GB", "Microsoft JhengHei", sans-serif;
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 40px 20px 10px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        #levelLabel {
            font-size: 0.65rem;
            letter-spacing: 4px;
            color: #b0b0b0;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        #levelName {
            font-size: 1.15rem;
            font-weight: 600;
            color: #666;
            letter-spacing: 1px;
        }

        #levelLogic {
            font-size: 0.8rem;
            color: var(--accent-soft);
            margin-top: 8px;
            font-weight: 400;
            opacity: 0.9;
        }

        .menu-trigger {
            position: absolute;
            right: 20px;
            top: 45px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 15px var(--shadow-soft);
            color: #999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .scene {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            perspective: 2000px;
        }

        .card {
            width: 100%;
            max-width: 310px;
            aspect-ratio: 1/1.4;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.85s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
        }

        .card.is-flipped {
            transform: rotateY(180deg) scale(1.05);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 45px;
            text-align: center;
            box-shadow: 0 25px 55px var(--shadow-soft);
            border: 1px solid rgba(255, 255, 255, 0.9);
        }

        .card-front {
            background: rgba(255, 255, 255, 0.98);
        }

        .card-back {
            transform: rotateY(180deg);
            overflow: hidden;
            position: relative;
        }

        .glow {
            position: absolute;
            width: 140%;
            height: 140%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.4) 0%, transparent 75%);
            top: -20%;
            left: -20%;
        }

        .logo-icon {
            font-size: 4.5rem;
            z-index: 2;
            opacity: 0.9;
        }

        #questionText {
            font-size: 1.45rem;
            line-height: 1.8;
            color: #444;
            font-weight: 500;
        }

        footer {
            padding: 20px 30px 60px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .draw-btn,
        .reset-btn {
            border: none;
            width: 100%;
            max-width: 280px;
            padding: 18px;
            border-radius: 35px;
            font-size: 1rem;
            font-weight: 600;
            box-shadow: 0 10px 30px var(--shadow-soft);
            transition: 0.3s;
            letter-spacing: 2px;
        }

        .draw-btn {
            background: #ffffff;
            color: #7a7a7a;
        }

        .reset-btn {
            background: #fff7f7;
            color: var(--danger-soft);
            font-size: 0.92rem;
            letter-spacing: 1px;
        }

        .progress-text {
            font-size: 0.8rem;
            color: #999;
            letter-spacing: 1px;
        }

        .menu-overlay {
            position: fixed;
            inset: 0;
            background: rgba(100, 90, 80, 0.05);
            backdrop-filter: blur(15px);
            display: flex;
            align-items: flex-end;
            visibility: hidden;
            opacity: 0;
            transition: 0.4s;
            z-index: 100;
        }

        .menu-overlay.open {
            visibility: visible;
            opacity: 1;
        }

        .menu-content {
            background: #ffffff;
            width: 100%;
            padding: 35px 25px 50px;
            border-radius: 50px 50px 0 0;
            transform: translateY(100%);
            transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            max-height: 85vh;
            overflow-y: auto;
        }

        .menu-overlay.open .menu-content {
            transform: translateY(0);
        }

        .menu-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 15px;
        }

        .menu-btn {
            background: #fdfdfd;
            border: 1px solid #f5f5f5;
            padding: 18px 20px;
            border-radius: 25px;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 18px;
            transition: 0.3s;
            cursor: pointer;
        }

        .menu-btn .btn-info {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .menu-btn .btn-title {
            font-weight: 600;
            color: #555;
            font-size: 1rem;
        }

        .menu-btn .btn-desc {
            font-size: 0.75rem;
            color: #999;
            margin-top: 4px;
        }

        .menu-btn.active {
            background: #fdfaf7;
            border-color: #f5e6d3;
        }

        .menu-btn.active .btn-title {
            color: var(--accent-soft);
        }

        .theme-0 {
            background: linear-gradient(135deg, #e0f2f1, #f1f8e9);
        }

        .theme-1 {
            background: linear-gradient(135deg, #fff5f5, #ffe3e3);
        }

        .theme-2 {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
        }

        .theme-3 {
            background: linear-gradient(135deg, #f3f0ff, #e5dbff);
        }

        .theme-4 {
            background: linear-gradient(135deg, #e3f2fd, #bbdefb);
        }

        .theme-5 {
            background: linear-gradient(135deg, #fff9db, #fff3bf);
        }

        .theme-6 {
            background: linear-gradient(135deg, #f1f3f5, #dee2e6);
        }

        .theme-rand {
            background: linear-gradient(135deg, #fdfaf7, #faedcd);
        }
    </style>
</head>

<body>

    <div class="app-container">
        <header>
            <div id="levelLabel">Deep Connection — 誠實為唯一原則</div>
            <div id="levelName">準備開始連結</div>
            <div id="levelLogic">輕觸卡牌抽題</div>
            <button class="menu-trigger" onclick="window.toggleMenu()">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                    <path
                        d="M9.405 1.05c-.413-1.4-2.397-1.4-2.81 0l-.1.34a1.464 1.464 0 0 1-2.105.872l-.31-.17c-1.283-.698-2.686.705-1.987 1.987l.169.311c.446.82.023 1.841-.872 2.105l-.34.1c-1.413-.413-1.413 2.397 0 2.81l.34.1c.895.264 1.318 1.286.872 2.105l-.17.31c-.698 1.283.705 2.686 1.988 1.987l.31-.169a1.464 1.464 0 0 1 2.105.872l.1.34c.413 1.413 2.397 1.413 2.81 0l.1-.34a1.464 1.464 0 0 1 2.105-.872l.31.17c1.283.698 2.686-.705 1.987-1.988l-.169-.31a1.464 1.464 0 0 1 .872-2.105l.34-.1c1.413-.413 1.413-2.397 0-2.81l-.34-.1a1.464 1.464 0 0 1-.872-2.105l.17-.31c.698-1.283-.705-2.686-1.988-1.987l-.31.169a1.464 1.464 0 0 1-2.105-.872zM8 10.93a2.93 2.93 0 1 1 0-5.86 2.93 2.93 0 0 1 0 5.86z" />
                </svg>
            </button>
        </header>

        <main class="scene" onclick="window.drawQuestion()">
            <div class="card" id="cardElement">
                <div class="card-face card-front">
                    <p id="questionText">輕觸卡牌<br>開啟這場深刻的對話</p>
                </div>
                <div class="card-face card-back theme-rand" id="cardBack">
                    <div class="glow"></div>
                    <div class="logo-icon" id="backIcon">🕯️</div>
                </div>
            </div>
        </main>

        <footer>
            <div class="progress-text" id="progressText">尚未開始</div>
            <button class="draw-btn" onclick="window.drawQuestion()">下一題 NEXT</button>
            <button class="reset-btn" onclick="window.resetProgress()">重置抽題進度</button>
        </footer>

        <div class="menu-overlay" id="menuOverlay">
            <div class="menu-content">
                <h4 style="margin:0 0 20px 0; color:#aaa; text-align:center; font-weight:400; letter-spacing:2px;">探索維度
                </h4>
                <div class="menu-grid">
                    <button class="menu-btn active" onclick="window.setLevel(-1, this)">
                        <span style="font-size: 1.4rem;">🎲</span>
                        <div class="btn-info">
                            <span class="btn-title">隨心而遇</span>
                            <span class="btn-desc">全題庫不重複抽題</span>
                        </div>
                    </button>
                    <button class="menu-btn" onclick="window.setLevel(0, this)">
                        <span style="font-size: 1.4rem;">🌊</span>
                        <div class="btn-info">
                            <span class="btn-title">價值對談</span>
                            <span class="btn-desc">分類內不重複抽題</span>
                        </div>
                    </button>
                    <button class="menu-btn" onclick="window.setLevel(1, this)">
                        <span style="font-size: 1.4rem;">❤️</span>
                        <div class="btn-info">
                            <span class="btn-title">親密情感</span>
                            <span class="btn-desc">分類內不重複抽題</span>
                        </div>
                    </button>
                    <button class="menu-btn" onclick="window.setLevel(2, this)">
                        <span style="font-size: 1.4rem;">💼</span>
                        <div class="btn-info">
                            <span class="btn-title">成長野心</span>
                            <span class="btn-desc">分類內不重複抽題</span>
                        </div>
                    </button>
                    <button class="menu-btn" onclick="window.setLevel(3, this)">
                        <span style="font-size: 1.4rem;">🌑</span>
                        <div class="btn-info">
                            <span class="btn-title">內在脆弱</span>
                            <span class="btn-desc">分類內不重複抽題</span>
                        </div>
                    </button>
                    <button class="menu-btn" onclick="window.setLevel(4, this)">
                        <span style="font-size: 1.4rem;">🌌</span>
                        <div class="btn-info">
                            <span class="btn-title">靈魂層次</span>
                            <span class="btn-desc">分類內不重複抽題</span>
                        </div>
                    </button>
                    <button class="menu-btn" onclick="window.setLevel(5, this)">
                        <span style="font-size: 1.4rem;">🔥</span>
                        <div class="btn-info">
                            <span class="btn-title">成熟社交</span>
                            <span class="btn-desc">分類內不重複抽題</span>
                        </div>
                    </button>
                    <button class="menu-btn" onclick="window.setLevel(6, this)">
                        <span style="font-size: 1.4rem;">🌙</span>
                        <div class="btn-info">
                            <span class="btn-title">深夜版</span>
                            <span class="btn-desc">分類內不重複抽題</span>
                        </div>
                    </button>
                </div>
                <button
                    style="width:100%; background:none; border:none; color:#ccc; margin-top:35px; font-size:0.85rem; cursor:pointer;"
                    onclick="window.toggleMenu()">返回</button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'deepTalkProgressV2';

        const allQuestions = [
            ["你認為人生最重要的是什麼？為什麼？", "如果只能選一個：自由、金錢、愛、成就，你選哪個？", "你最不能接受的價值觀是什麼？", "你覺得一個人窮沒關係，還是沒責任感比較嚴重？", "你相信努力一定有回報嗎？", "你怎麼看待忠誠？", "如果愛和麵包衝突，你怎麼選？", "你會為了理想放棄穩定嗎？", "你覺得伴侶三觀不同還能走下去嗎？", "你會因為價值觀不合離開一個很愛的人嗎？"],
            ["你在愛裡最害怕的是什麼？", "你會為了愛改變自己嗎？", "你覺得安全感應該自己給還是對方給？", "你需要每天聯絡嗎？", "你怎麼定義背叛？", "你能接受冷戰嗎？", "你愛一個人會變黏還是變獨立？", "你覺得愛是選擇還是感覺？", "你會因為缺乏安全感去測試對方嗎？", "你最渴望被怎樣愛？"],
            ["你工作是為了錢還是成就感？", "你願意為升遷犧牲多少？", "你可以接受不喜歡的工作多久？", "你有野心嗎？多大？", "你羨慕別人成功時會怎麼想？", "你有沒有曾經懷疑自己不夠好？", "你會為了夢想承受孤獨嗎？", "你更怕失敗，還是平庸？", "你覺得自己是自律的人嗎？", "你最想證明給誰看？"],
            ["你最不想被別人知道的弱點是？", "你曾經最自卑的是什麼？", "你最害怕被拋棄嗎？", "你有討厭過自己嗎？", "你最後悔的一件事？", "你最難原諒自己的是什麼？", "你會用什麼方式逃避痛苦？", "當你脆弱時，你希望被安慰還是被理解？", "你最深的恐懼是什麼？", "你有沒有一個從來沒說出口的傷？"],
            ["你相信靈魂伴侶嗎？", "你覺得自己活得真實嗎？", "你最想成為什麼樣的人？", "你覺得人生有意義嗎？", "你想被怎樣記住？", "你有恐懼死亡嗎？", "你覺得人來世上是來學什麼的？", "你覺得成熟是什麼？", "你有沒有一個一直追尋的答案？", "如果一切都會消失，你還會堅持什麼？"],
            ["在朋友關係裡，你最害怕被誤解的是哪一點？", "你在群體裡通常會隱藏哪一面自己？", "你覺得自己在人際關係中最大的盲點是什麼？", "你最常在人前假裝沒事的是哪種情緒？", "你有沒有為了維持關係而演過一個不像自己的角色？", "你在社交場合最容易感到疲憊的是什麼時刻？", "如果大家都喜歡你，但沒有人真正懂你，你會滿足嗎？", "你最怕別人怎麼評價你？", "你在人際裡最不願承認的需求是什麼？", "你曾經有過『其實我不想合群』的時候嗎？"],
            ["你有沒有曾經因為朋友的一句話偷偷難過？", "你最害怕在友情裡失去的是什麼？", "你有有沒有曾經覺得自己其實不夠被重視？", "你其實最希望哪一種人懂你？", "你最難說出口的依賴是什麼？", "當你覺得被忽略時，你通常會假裝沒事還是直接說？", "你曾經在人多的時候感到特別孤單嗎？", "你最害怕深夜想起的那種失落是什麼？", "你有沒有一段關係，表面過去了但其實心裡還沒？", "如果有人真的看穿你的脆弱，你會想靠近還是逃開？"]
        ];

        const themes = [
            { name: "價值對談", logic: "決策邏輯、底層作業系統", icon: "🍃" },
            { name: "親密情感", logic: "依附模式、安全感來源", icon: "✨" },
            { name: "成長野心", logic: "自我價值來源、動機", icon: "🕊️" },
            { name: "內在脆弱", logic: "陰影、防衛機制", icon: "🌙" },
            { name: "靈魂層次", logic: "生命目標、成熟度", icon: "🪐" },
            { name: "成熟社交", logic: "社會面具與真實自我", icon: "🕯️" },
            { name: "深夜版", logic: "失落與依賴", icon: "☁️" }
        ];

        let currentLevel = -1;
        let isFlipping = false;
        let progressState = createFreshProgressState();

        function shuffle(array) {
            const result = [...array];
            for (let i = result.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [result[i], result[j]] = [result[j], result[i]];
            }
            return result;
        }

        function createRandomDeck() {
            return shuffle(
                allQuestions.flatMap((questions, themeIndex) =>
                    questions.map((question, questionIndex) => ({ themeIndex, questionIndex, question }))
                )
            );
        }

        function createLevelDeck(levelIndex) {
            return shuffle(
                allQuestions[levelIndex].map((question, questionIndex) => ({ themeIndex: levelIndex, questionIndex, question }))
            );
        }

        function createFreshProgressState() {
            return {
                randomDeck: createRandomDeck(),
                levelDecks: allQuestions.map((_, index) => createLevelDeck(index))
            };
        }

        function saveProgress() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(progressState));
        }

        function isValidCard(card) {
            return card
                && Number.isInteger(card.themeIndex)
                && Number.isInteger(card.questionIndex)
                && allQuestions[card.themeIndex]
                && allQuestions[card.themeIndex][card.questionIndex] === card.question;
        }

        function validateDeck(deck, expectedThemeIndex = null) {
            return Array.isArray(deck)
                && deck.every(card => {
                    if (!isValidCard(card)) return false;
                    if (expectedThemeIndex !== null && card.themeIndex !== expectedThemeIndex) return false;
                    return true;
                });
        }

        function loadProgress() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) {
                    progressState = createFreshProgressState();
                    saveProgress();
                    return;
                }

                const parsed = JSON.parse(raw);
                const randomDeck = validateDeck(parsed.randomDeck) ? parsed.randomDeck : createRandomDeck();
                const levelDecks = allQuestions.map((_, index) => {
                    const savedDeck = parsed.levelDecks && parsed.levelDecks[index];
                    return validateDeck(savedDeck, index) ? savedDeck : createLevelDeck(index);
                });

                progressState = { randomDeck, levelDecks };
                saveProgress();
            } catch (error) {
                progressState = createFreshProgressState();
                saveProgress();
            }
        }

        function getRemainingCount(level) {
            return level === -1
                ? progressState.randomDeck.length
                : progressState.levelDecks[level].length;
        }

        function getTotalCount(level) {
            return level === -1
                ? allQuestions.reduce((sum, questions) => sum + questions.length, 0)
                : allQuestions[level].length;
        }

        function updateProgressText() {
            const progressText = document.getElementById('progressText');
            const total = getTotalCount(currentLevel);
            const remaining = getRemainingCount(currentLevel);
            const used = total - remaining;

            if (currentLevel === -1) {
                progressText.innerText = `隨心而遇進度：已抽 ${used} / ${total} 題，剩餘 ${remaining} 題`;
            } else {
                progressText.innerText = `${themes[currentLevel].name}：已抽 ${used} / ${total} 題，剩餘 ${remaining} 題`;
            }
        }

        function getNextCardForLevel(level) {
            if (level === -1) {
                if (progressState.randomDeck.length === 0) {
                    progressState.randomDeck = createRandomDeck();
                }
                const card = progressState.randomDeck.pop();
                saveProgress();
                return card;
            }

            if (progressState.levelDecks[level].length === 0) {
                progressState.levelDecks[level] = createLevelDeck(level);
            }
            const card = progressState.levelDecks[level].pop();
            saveProgress();
            return card;
        }

        function updateLevelDisplay(level, drawnThemeIndex = null) {
            if (level === -1) {
                if (drawnThemeIndex === null) {
                    document.getElementById('levelName').innerText = "隨心而遇";
                    document.getElementById('levelLogic').innerText = "全題庫不重複抽題，抽完才重洗";
                } else {
                    document.getElementById('levelName').innerText = `${themes[drawnThemeIndex].name} · 隨心而遇`;
                    document.getElementById('levelLogic').innerText = "全題庫不重複抽題，重開頁面也會保留進度";
                }
            } else {
                document.getElementById('levelName').innerText = themes[level].name;
                document.getElementById('levelLogic').innerText = `${themes[level].logic}｜分類內不重複抽題`;
            }
        }

        window.toggleMenu = function () {
            document.getElementById('menuOverlay').classList.toggle('open');
        }

        window.setLevel = function (lv, btn) {
            currentLevel = lv;
            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            updateLevelDisplay(lv);
            updateProgressText();
            window.toggleMenu();
            window.drawQuestion();
        }

        window.drawQuestion = function () {
            if (isFlipping) return;
            isFlipping = true;

            const card = document.getElementById('cardElement');
            const cardBack = document.getElementById('cardBack');
            const nextCard = getNextCardForLevel(currentLevel);

            card.classList.add('is-flipped');

            setTimeout(() => {
                cardBack.className = 'card-face card-back theme-' + nextCard.themeIndex;
                document.getElementById('backIcon').innerText = themes[nextCard.themeIndex].icon;
                document.getElementById('questionText').innerText = nextCard.question;

                updateLevelDisplay(currentLevel, nextCard.themeIndex);
                updateProgressText();

                card.classList.remove('is-flipped');
                setTimeout(() => { isFlipping = false; }, 850);
            }, 400);
        }

        window.resetProgress = function () {
            const confirmed = window.confirm('要重置所有抽題進度嗎？重置後會忘記目前所有已抽過的題目，重新開始。');
            if (!confirmed) return;

            progressState = createFreshProgressState();
            saveProgress();
            updateLevelDisplay(currentLevel);
            updateProgressText();
            document.getElementById('questionText').innerHTML = '進度已重置<br>輕觸卡牌重新開始';
            document.getElementById('backIcon').innerText = '🕯️';
            document.getElementById('cardBack').className = 'card-face card-back theme-rand';
        }

        loadProgress();
        updateLevelDisplay(currentLevel);
        updateProgressText();
    </script>
</body>

</html>
