<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>心靈對話 | 深刻認識一個人</title>
    <style>
        :root {
            --bg-warm: #fdfaf7;
            --text-main: #4a4a4a;
            --accent-soft: #d4a373;
            --shadow-soft: rgba(180, 160, 140, 0.12);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        body {
            margin: 0;
            background: linear-gradient(135deg, #fdfaf7 0%, #e8f0f2 100%);
            font-family: "PingFang TC", "Hiragino Sans GB", "Microsoft JhengHei", sans-serif;
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 40px 20px 10px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        #levelLabel {
            font-size: 0.65rem;
            letter-spacing: 4px;
            color: #b0b0b0;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        #levelName {
            font-size: 1.15rem;
            font-weight: 600;
            color: #666;
            letter-spacing: 1px;
        }

        /* 黃色備註區：顯示心理學定義 */
        #levelLogic {
            font-size: 0.8rem;
            color: var(--accent-soft);
            margin-top: 8px;
            font-weight: 400;
            opacity: 0.9;
        }

        .menu-trigger {
            position: absolute;
            right: 20px;
            top: 45px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 15px var(--shadow-soft);
            color: #999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .scene {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            perspective: 2000px;
        }

        .card {
            width: 100%;
            max-width: 310px;
            aspect-ratio: 1/1.4;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.85s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
        }

        .card.is-flipped {
            transform: rotateY(180deg) scale(1.05);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 45px;
            text-align: center;
            box-shadow: 0 25px 55px var(--shadow-soft);
            border: 1px solid rgba(255, 255, 255, 0.9);
        }

        .card-front {
            background: rgba(255, 255, 255, 0.98);
        }

        .card-back {
            transform: rotateY(180deg);
            overflow: hidden;
            position: relative;
        }

        .glow {
            position: absolute;
            width: 140%;
            height: 140%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.4) 0%, transparent 75%);
            top: -20%;
            left: -20%;
        }

        .logo-icon {
            font-size: 4.5rem;
            z-index: 2;
            opacity: 0.9;
        }

        #questionText {
            font-size: 1.45rem;
            line-height: 1.8;
            color: #444;
            font-weight: 500;
        }

        footer {
            padding: 20px 40px 60px;
            text-align: center;
        }

        .draw-btn {
            background: #ffffff;
            color: #7a7a7a;
            border: none;
            width: 100%;
            max-width: 280px;
            padding: 18px;
            border-radius: 35px;
            font-size: 1rem;
            font-weight: 600;
            box-shadow: 0 10px 30px var(--shadow-soft);
            transition: 0.3s;
            letter-spacing: 2px;
        }

        .menu-overlay {
            position: fixed;
            inset: 0;
            background: rgba(100, 90, 80, 0.05);
            backdrop-filter: blur(15px);
            display: flex;
            align-items: flex-end;
            visibility: hidden;
            opacity: 0;
            transition: 0.4s;
            z-index: 100;
        }

        .menu-overlay.open {
            visibility: visible;
            opacity: 1;
        }

        .menu-content {
            background: #ffffff;
            width: 100%;
            padding: 35px 25px 50px;
            border-radius: 50px 50px 0 0;
            transform: translateY(100%);
            transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            max-height: 85vh;
            overflow-y: auto;
        }

        .menu-overlay.open .menu-content {
            transform: translateY(0);
        }

        .menu-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 15px;
        }

        .menu-btn {
            background: #fdfdfd;
            border: 1px solid #f5f5f5;
            padding: 18px 20px;
            border-radius: 25px;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 18px;
            transition: 0.3s;
            cursor: pointer;
        }

        .menu-btn .btn-info {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .menu-btn .btn-title {
            font-weight: 600;
            color: #555;
            font-size: 1rem;
        }

        .menu-btn .btn-desc {
            font-size: 0.75rem;
            color: #999;
            margin-top: 4px;
        }

        .menu-btn.active {
            background: #fdfaf7;
            border-color: #f5e6d3;
        }

        .menu-btn.active .btn-title {
            color: var(--accent-soft);
        }

        .theme-0 {
            background: linear-gradient(135deg, #e0f2f1, #f1f8e9);
        }

        .theme-1 {
            background: linear-gradient(135deg, #fff5f5, #ffe3e3);
        }

        .theme-2 {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
        }

        .theme-3 {
            background: linear-gradient(135deg, #f3f0ff, #e5dbff);
        }

        .theme-4 {
            background: linear-gradient(135deg, #e3f2fd, #bbdefb);
        }

        .theme-5 {
            background: linear-gradient(135deg, #fff9db, #fff3bf);
        }

        .theme-6 {
            background: linear-gradient(135deg, #f1f3f5, #dee2e6);
        }

        .theme-rand {
            background: linear-gradient(135deg, #fdfaf7, #faedcd);
        }
    </style>
</head>

<body>

    <div class="app-container">
        <header>
            <div id="levelLabel">Deep Connection — 誠實為唯一原則</div>
            <div id="levelName">準備開始連結</div>
            <div id="levelLogic">輕觸卡牌抽題</div>
            <button class="menu-trigger" onclick="window.toggleMenu()">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                    <path
                        d="M9.405 1.05c-.413-1.4-2.397-1.4-2.81 0l-.1.34a1.464 1.464 0 0 1-2.105.872l-.31-.17c-1.283-.698-2.686.705-1.987 1.987l.169.311c.446.82.023 1.841-.872 2.105l-.34.1c-1.413.413-1.413 2.397 0 2.81l.34.1a1.464 1.464 0 0 1 .872 2.105l-.17.31c-.698 1.283.705 2.686 1.987 1.987l.311-.169a1.464 1.464 0 0 1 2.105.872l.1.34c.413 1.413 2.397 1.413 2.81 0l.1-.34a1.464 1.464 0 0 1 2.105-.872l.31.17c1.283.698 2.686-.705 1.987-1.987l-.169-.311a1.464 1.464 0 0 1 .872-2.105l.34-.1c1.413-.413 1.413-2.397 0-2.81l-.34-.1a1.464 1.464 0 0 1-.872-2.105l.17-.31c.698-1.283-.705-2.686-1.987-1.987l-.311.169a1.464 1.464 0 0 1-2.105-.872l-.1-.34zM8 10.93a2.929 2.929 0 1 1 0-5.86 2.929 2.929 0 0 1 0 5.858z" />
                </svg>
            </button>
        </header>

        <main class="scene" onclick="window.drawQuestion()">
            <div class="card" id="cardElement">
                <div class="card-face card-front">
                    <p id="questionText">輕觸卡牌<br>開啟這場深刻的對話</p>
                </div>
                <div class="card-face card-back theme-rand" id="cardBack">
                    <div class="glow"></div>
                    <div class="logo-icon" id="backIcon">🕯️</div>
                </div>
            </div>
        </main>

        <footer>
            <button class="draw-btn" onclick="window.drawQuestion()">下一題 NEXT</button>
        </footer>

        <div class="menu-overlay" id="menuOverlay">
            <div class="menu-content">
                <h4 style="margin:0 0 20px 0; color:#aaa; text-align:center; font-weight:400; letter-spacing:2px;">探索維度
                </h4>
                <div class="menu-grid">
                    <button class="menu-btn active" onclick="window.setLevel(-1, this)">
                        <span style="font-size: 1.4rem;">🎲</span>
                        <div class="btn-info">
                            <span class="btn-title">隨心而遇</span>
                            <span class="btn-desc">全題庫隨機跳轉</span>
                        </div>
                    </button>
                    <button class="menu-btn" onclick="window.setLevel(0, this)">
                        <span style="font-size: 1.4rem;">🌊</span>
                        <div class="btn-info">
                            <span class="btn-title">價值對談</span>
                            <span class="btn-desc">決策邏輯、底層作業系統</span>
                        </div>
                    </button>
                    <button class="menu-btn" onclick="window.setLevel(1, this)">
                        <span style="font-size: 1.4rem;">❤️</span>
                        <div class="btn-info">
                            <span class="btn-title">親密情感</span>
                            <span class="btn-desc">依附模式、安全感來源</span>
                        </div>
                    </button>
                    <button class="menu-btn" onclick="window.setLevel(2, this)">
                        <span style="font-size: 1.4rem;">💼</span>
                        <div class="btn-info">
                            <span class="btn-title">成長野心</span>
                            <span class="btn-desc">自我價值來源、動機</span>
                        </div>
                    </button>
                    <button class="menu-btn" onclick="window.setLevel(3, this)">
                        <span style="font-size: 1.4rem;">🌑</span>
                        <div class="btn-info">
                            <span class="btn-title">內在脆弱</span>
                            <span class="btn-desc">陰影、防衛機制</span>
                        </div>
                    </button>
                    <button class="menu-btn" onclick="window.setLevel(4, this)">
                        <span style="font-size: 1.4rem;">🌌</span>
                        <div class="btn-info">
                            <span class="btn-title">靈魂層次</span>
                            <span class="btn-desc">生命目標、成熟度</span>
                        </div>
                    </button>
                    <button class="menu-btn" onclick="window.setLevel(5, this)">
                        <span style="font-size: 1.4rem;">🔥</span>
                        <div class="btn-info">
                            <span class="btn-title">成熟社交</span>
                            <span class="btn-desc">社會面具與真實自我</span>
                        </div>
                    </button>
                    <button class="menu-btn" onclick="window.setLevel(6, this)">
                        <span style="font-size: 1.4rem;">🌙</span>
                        <div class="btn-info">
                            <span class="btn-title">深夜版</span>
                            <span class="btn-desc">失落與依賴</span>
                        </div>
                    </button>
                </div>
                <button
                    style="width:100%; background:none; border:none; color:#ccc; margin-top:35px; font-size:0.85rem; cursor:pointer;"
                    onclick="window.toggleMenu()">返回</button>
            </div>
        </div>
    </div>

    <script>
        const allQuestions = [
            ["你認為人生最重要的是什麼？為什麼？", "如果只能選一個：自由、金錢、愛、成就，你選哪個？", "你最不能接受的價值觀是什麼？", "你覺得成功的定義是什麼？", "你認為人性本善還是本惡？", "你覺得忠誠重要嗎？在哪些情況下可以不忠誠？", "你會為了夢想犧牲穩定嗎？", "你最佩服哪種人？", "你覺得錢可以解決90%的問題嗎？", "你寧願被討厭還是被忽略？", "你認為「對」比「關係」重要嗎？", "你怎麼看待嫉妒這種情緒？", "你認為誠實應該是無條件的嗎？", "你會為朋友挺身而出到什麼程度？", "你最討厭別人對你做什麼？", "你相信命運還是努力？", "你覺得人需要婚姻嗎？", "你覺得家庭對你的影響深嗎？", "你最重視的三個人生原則是？", "如果今天一切歸零，你最想保留什麼？"],
            ["你在愛裡最害怕的是什麼？", "你會為了愛改變自己嗎？", "你覺得安全感應該自己給還是對方給？", "你需要每天聯絡嗎？", "你怎麼定義背叛？", "冷戰時你會主動低頭嗎？", "你會檢查另一半手機嗎？", "你更重視激情還是穩定？", "你覺得分手後還能當朋友嗎？", "你談戀愛最容易犯的錯是什麼？", "你愛一個人的表現是什麼？", "你覺得愛可以持續一輩子嗎？", "你最不能忍受伴侶什麼特質？", "你會因為對方家境改變選擇嗎？", "你覺得「對的人」是什麼感覺？", "你覺得吵架重要嗎？", "你在感情中是付出多還是索取多？", "你覺得愛與尊重哪個重要？", "你最難忘的一段關係教會你什麼？", "如果現在的伴侶消失，你最不捨的是什麼？"],
            ["你工作是為了錢還是成就感？", "你願意為升遷犧牲多少？", "你可以接受不喜歡的工作多久？", "你有野心嗎？多大？", "你羨慕別人成功時會怎麼想？", "你最怕在職場被貼什麼標籤？", "你認為自己適合當老闆嗎？", "你覺得努力一定會有回報嗎？", "你會為工作搬到陌生國家嗎？", "你願意為錢做違背原則的事嗎？", "你覺得穩定跟爆發，哪個適合你？", "你覺得自己有天賦嗎？", "你對失敗的容忍度高嗎？", "你怎麼面對同儕比你優秀？", "你想讓世界記住你什麼？", "你有想過退休生活嗎？", "你願意為夢想賭上全部嗎？", "你會嫉妒成功的人嗎？", "你最想證明什麼？", "如果沒有金錢壓力，你會做什麼？"],
            ["你最不想被別人知道的弱點是？", "你曾經最自卑的是什麼？", "你最害怕被拋棄嗎？", "你有討厭過自己嗎？", "你最後悔的一件事？", "你最難原諒誰？", "你會假裝堅強嗎？", "你曾經為誰掉過眼淚？", "你覺得自己值得被愛嗎？", "你害怕孤單還是害怕失敗？", "你曾經嫉妒朋友嗎？", "你會因為比較而焦慮嗎？", "你最常壓抑的是什麼情緒？", "你覺得自己哪一面最真實？", "如果可以重新來過，你會改變什麼？"],
            ["你相信靈魂伴侶嗎？", "你覺得自己活得真實嗎？", "你最想成為什麼樣的人？", "你覺得人生有意義嗎？", "你想被怎樣記住？", "你有恐懼死亡嗎？", "你覺得自己幸福嗎？", "你理想的一天是什麼樣子？", "你會為誰犧牲？", "你覺得人生最重要的一課是？", "你最想彌補什麼？", "你覺得自己成熟嗎？", "你最感謝誰？", "你願意為愛放棄夢想嗎？", "你最想對未來的自己說什麼？"],
            ["在朋友關係裡，你最害怕被誤解的是哪一點？", "你在群體裡通常會隱藏哪一面自己？", "你覺得自己在人際關係中最大的盲點是什麼？", "你最討厭自己在人際中的哪種反應？", "你其實很在意，但平常裝作不在意的是什麼？", "當你覺得被忽略時，你會怎麼處理？", "你在人群中更害怕衝突，還是更害怕被忽視？", "你有沒有曾經在友情中比較過？比較的是什麼？", "你覺得朋友應該為你做到什麼程度才算真心？", "如果要你誠實說一句，你現在最渴望被理解的是什麼？"],
            ["你有沒有曾經因為朋友的一句話偷偷難過？", "你最害怕在友情裡失去的是什麼？", "你有有沒有曾經覺得自己其實不夠被重視？", "你其實最想被朋友怎麼對待？", "你在人群裡會孤單嗎？", "你有有沒有曾經故意不回訊息，因為失望？", "你覺得朋友應該懂你，還是你應該說清楚？", "你最難過的一次友情經驗是什麼？", "如果有一天大家各奔東西，你最怕遺憾什麼？", "如果此刻只能說一句真心話，你會說什麼？"]
        ];

        const themes = [
            { name: "價值對談", logic: "決策邏輯、底層作業系統", icon: "🍃" },
            { name: "親密情感", logic: "依附模式、安全感來源", icon: "✨" },
            { name: "成長野心", logic: "自我價值來源、動機", icon: "🕊️" },
            { name: "內在脆弱", logic: "陰影、防衛機制", icon: "🌙" },
            { name: "靈魂層次", logic: "生命目標、成熟度", icon: "🪐" },
            { name: "成熟社交", logic: "社會面具與真實自我", icon: "🕯️" },
            { name: "深夜版", logic: "失落與依賴", icon: "☁️" }
        ];

        let currentLevel = -1;
        let isFlipping = false;

        window.toggleMenu = function () {
            document.getElementById('menuOverlay').classList.toggle('open');
        }

        window.setLevel = function (lv, btn) {
            currentLevel = lv;
            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            if (lv === -1) {
                document.getElementById('levelName').innerText = "隨心而遇";
                document.getElementById('levelLogic').innerText = "全題庫隨機跳轉";
            } else {
                document.getElementById('levelName').innerText = themes[lv].name;
                document.getElementById('levelLogic').innerText = themes[lv].logic;
            }

            window.toggleMenu();
            window.drawQuestion();
        }

        window.drawQuestion = function () {
            if (isFlipping) return;
            isFlipping = true;

            const card = document.getElementById('cardElement');
            const cardBack = document.getElementById('cardBack');

            let lvIdx = (currentLevel === -1) ? Math.floor(Math.random() * 7) : currentLevel;
            let pool = allQuestions[lvIdx];
            let q = pool[Math.floor(Math.random() * pool.length)];

            card.classList.add('is-flipped');

            setTimeout(() => {
                cardBack.className = "card-face card-back theme-" + lvIdx;
                document.getElementById('backIcon').innerText = themes[lvIdx].icon;
                document.getElementById('questionText').innerText = q;

                if (currentLevel === -1) {
                    document.getElementById('levelName').innerText = themes[lvIdx].name;
                    document.getElementById('levelLogic').innerText = themes[lvIdx].logic;
                }

                card.classList.remove('is-flipped');
                setTimeout(() => { isFlipping = false; }, 850);
            }, 400);
        }
    </script>
</body>

</html>
