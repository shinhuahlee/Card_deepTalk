<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>心靈對話 | 深刻認識一個人</title>
    <style>
        :root {
            --bg-warm: #fdfaf7;
            --text-main: #4a4a4a;
            --accent-soft: #d4a373;
            --shadow-soft: rgba(180, 160, 140, 0.12);
            --danger-soft: #d88c8c;
            --notice-soft: #7aa7a2;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            min-height: 100%;
            overflow: hidden;
        }

        body {
            background: linear-gradient(135deg, #fdfaf7 0%, #e8f0f2 100%);
            font-family: "PingFang TC", "Hiragino Sans GB", "Microsoft JhengHei", sans-serif;
            color: var(--text-main);
            height: 100dvh;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            min-height: 100dvh;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        header {
            padding: 18px 20px 10px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        #levelLabel {
            font-size: 0.62rem;
            letter-spacing: 2px;
            color: #b0b0b0;
            margin-bottom: 6px;
            text-transform: uppercase;
            padding: 0 48px;
        }

        #levelName {
            font-size: 1.05rem;
            font-weight: 600;
            color: #666;
            letter-spacing: 0.5px;
            padding: 0 48px;
        }

        #levelLogic {
            font-size: 0.78rem;
            color: var(--accent-soft);
            margin-top: 8px;
            font-weight: 400;
            opacity: 0.9;
            padding: 0 24px;
            line-height: 1.5;
        }

        .menu-trigger {
            position: absolute;
            right: 16px;
            top: 18px;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(10px);
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 15px var(--shadow-soft);
            color: #999;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .scene {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px 16px;
            perspective: 2000px;
            min-height: 0;
        }

        .card {
            width: min(100%, 320px);
            aspect-ratio: 1 / 1.42;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.85s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
        }

        .card.is-flipped {
            transform: rotateY(180deg) scale(1.03);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 36px;
            text-align: center;
            box-shadow: 0 20px 45px var(--shadow-soft);
            border: 1px solid rgba(255, 255, 255, 0.9);
        }

        .card-front {
            background: rgba(255, 255, 255, 0.98);
        }

        .card-back {
            transform: rotateY(180deg);
            overflow: hidden;
            position: relative;
        }

        .glow {
            position: absolute;
            width: 140%;
            height: 140%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.4) 0%, transparent 75%);
            top: -20%;
            left: -20%;
        }

        .logo-icon {
            font-size: 4rem;
            z-index: 2;
            opacity: 0.9;
        }

        #questionText {
            font-size: clamp(1.1rem, 4.4vw, 1.35rem);
            line-height: 1.75;
            color: #444;
            font-weight: 500;
            word-break: break-word;
        }

        footer {
            padding: 8px 16px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .progress-text,
        .notice-text {
            font-size: 0.78rem;
            letter-spacing: 0.5px;
            line-height: 1.45;
            max-width: 320px;
        }

        .progress-text {
            color: #999;
        }

        .notice-text {
            color: var(--notice-soft);
            min-height: 2.4em;
        }

        .btn-row {
            width: 100%;
            max-width: 320px;
            display: flex;
            gap: 10px;
        }

        .draw-btn,
        .reset-btn,
        .prev-btn {
            border: none;
            width: 100%;
            padding: 16px 14px;
            border-radius: 24px;
            font-size: 0.96rem;
            font-weight: 600;
            box-shadow: 0 10px 24px var(--shadow-soft);
            transition: 0.3s;
        }

        .draw-btn {
            background: #ffffff;
            color: #7a7a7a;
            letter-spacing: 1px;
        }

        .prev-btn {
            background: #f3f7f7;
            color: #6f8f8b;
            font-size: 0.92rem;
            letter-spacing: 0.5px;
        }

        .prev-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            box-shadow: none;
        }

        .reset-btn {
            background: #fff7f7;
            color: var(--danger-soft);
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            max-width: 320px;
        }

        .menu-overlay {
            position: fixed;
            inset: 0;
            background: rgba(100, 90, 80, 0.08);
            backdrop-filter: blur(15px);
            display: flex;
            align-items: flex-end;
            visibility: hidden;
            opacity: 0;
            transition: 0.4s;
            z-index: 100;
        }

        .menu-overlay.open {
            visibility: visible;
            opacity: 1;
        }

        .menu-content {
            background: #ffffff;
            width: 100%;
            padding: 28px 18px 28px;
            border-radius: 28px 28px 0 0;
            transform: translateY(100%);
            transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            max-height: 82dvh;
            overflow-y: auto;
        }

        .menu-overlay.open .menu-content {
            transform: translateY(0);
        }

        .menu-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }

        .menu-btn {
            background: #fdfdfd;
            border: 1px solid #f5f5f5;
            padding: 16px;
            border-radius: 20px;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: 0.3s;
            cursor: pointer;
        }

        .menu-btn .btn-info {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .menu-btn .btn-title {
            font-weight: 600;
            color: #555;
            font-size: 0.98rem;
        }

        .menu-btn .btn-desc {
            font-size: 0.74rem;
            color: #999;
            margin-top: 4px;
            line-height: 1.4;
        }

        .menu-btn.active {
            background: #fdfaf7;
            border-color: #f5e6d3;
        }

        .menu-btn.active .btn-title {
            color: var(--accent-soft);
        }

        .theme-0 {
            background: linear-gradient(135deg, #e0f2f1, #f1f8e9);
        }

        .theme-1 {
            background: linear-gradient(135deg, #fff5f5, #ffe3e3);
        }

        .theme-2 {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
        }

        .theme-3 {
            background: linear-gradient(135deg, #f3f0ff, #e5dbff);
        }

        .theme-4 {
            background: linear-gradient(135deg, #e3f2fd, #bbdefb);
        }

        .theme-5 {
            background: linear-gradient(135deg, #fff9db, #fff3bf);
        }

        .theme-6 {
            background: linear-gradient(135deg, #f1f3f5, #dee2e6);
        }

        .theme-rand {
            background: linear-gradient(135deg, #fdfaf7, #faedcd);
        }

        @media (min-width: 768px) {
            header {
                padding-top: 32px;
            }

            .scene {
                padding: 20px;
            }

            .card {
                max-width: 340px;
            }

            .card-face {
                border-radius: 40px;
                padding: 36px 32px;
            }

            footer {
                padding-top: 14px;
            }
        }
    </style>
</head>

<body>

    <div class="app-container">
        <header>
            <div id="levelLabel">Deep Connection — 誠實為唯一原則</div>
            <div id="levelName">準備開始連結</div>
            <div id="levelLogic">輕觸卡牌抽題</div>
            <button class="menu-trigger" onclick="window.toggleMenu()">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                    <path
                        d="M9.405 1.05c-.413-1.4-2.397-1.4-2.81 0l-.1.34a1.464 1.464 0 0 1-2.105.872l-.31-.17c-1.283-.698-2.686.705-1.987 1.987l.169.311c.446.82.023 1.841-.872 2.105l-.34.1c-1.413.413-1.413 2.397 0 2.81l.34.1c.895.264 1.318 1.285.872 2.105l-.17.31c-.698 1.283.705 2.686 1.988 1.987l.31-.169a1.464 1.464 0 0 1 2.105.872l.1.34c.413 1.413 2.397 1.413 2.81 0l.1-.34a1.464 1.464 0 0 1 2.105-.872l.31.17c1.283.698 2.686-.705 1.987-1.988l-.169-.31a1.464 1.464 0 0 1 .872-2.105l.34-.1c1.413-.413 1.413-2.397 0-2.81l-.34-.1a1.464 1.464 0 0 1-.872-2.105l.17-.31c.698-1.283-.705-2.686-1.988-1.987l-.31.169a1.464 1.464 0 0 1-2.105-.872zM8 10.93A2.93 2.93 0 1 1 8 5.07a2.93 2.93 0 0 1 0 5.86z" />
                </svg>
            </button>
        </header>

        <main class="scene" onclick="window.drawQuestion()">
            <div class="card" id="cardElement">
                <div class="card-face card-front">
                    <p id="questionText">輕觸卡牌<br>開啟這場深刻的對話</p>
                </div>
                <div class="card-face card-back theme-rand" id="cardBack">
                    <div class="glow"></div>
                    <div class="logo-icon" id="backIcon">🕯️</div>
                </div>
            </div>
        </main>

        <footer>
            <div class="progress-text" id="progressText">尚未開始</div>
            <div class="notice-text" id="noticeText"></div>
            <div class="btn-row">
                <button class="prev-btn" id="prevBtn" onclick="window.showPreviousQuestion()" disabled>上一題</button>
                <button class="draw-btn" onclick="window.drawQuestion()">下一題 NEXT</button>
            </div>
            <button class="reset-btn" onclick="window.resetProgress()">重置抽題進度</button>
        </footer>

        <div class="menu-overlay" id="menuOverlay">
            <div class="menu-content">
                <h4 style="margin:0 0 20px 0; color:#aaa; text-align:center; font-weight:400; letter-spacing:2px;">探索維度
                </h4>
                <div class="menu-grid">
                    <button class="menu-btn active" onclick="window.setLevel(-1, this)">
                        <span style="font-size: 1.4rem;">🎲</span>
                        <div class="btn-info">
                            <span class="btn-title">隨心而遇</span>
                            <span class="btn-desc">全題庫不重複抽題</span>
                        </div>
                    </button>
                    <button class="menu-btn" onclick="window.setLevel(0, this)">
                        <span style="font-size: 1.4rem;">🌊</span>
                        <div class="btn-info">
                            <span class="btn-title">價值對談</span>
                            <span class="btn-desc">分類內不重複抽題</span>
                        </div>
                    </button>
                    <button class="menu-btn" onclick="window.setLevel(1, this)">
                        <span style="font-size: 1.4rem;">❤️</span>
                        <div class="btn-info">
                            <span class="btn-title">親密情感</span>
                            <span class="btn-desc">分類內不重複抽題</span>
                        </div>
                    </button>
                    <button class="menu-btn" onclick="window.setLevel(2, this)">
                        <span style="font-size: 1.4rem;">💼</span>
                        <div class="btn-info">
                            <span class="btn-title">成長野心</span>
                            <span class="btn-desc">分類內不重複抽題</span>
                        </div>
                    </button>
                    <button class="menu-btn" onclick="window.setLevel(3, this)">
                        <span style="font-size: 1.4rem;">🌑</span>
                        <div class="btn-info">
                            <span class="btn-title">內在脆弱</span>
                            <span class="btn-desc">分類內不重複抽題</span>
                        </div>
                    </button>
                    <button class="menu-btn" onclick="window.setLevel(4, this)">
                        <span style="font-size: 1.4rem;">🌌</span>
                        <div class="btn-info">
                            <span class="btn-title">靈魂層次</span>
                            <span class="btn-desc">分類內不重複抽題</span>
                        </div>
                    </button>
                    <button class="menu-btn" onclick="window.setLevel(5, this)">
                        <span style="font-size: 1.4rem;">🔥</span>
                        <div class="btn-info">
                            <span class="btn-title">成熟社交</span>
                            <span class="btn-desc">分類內不重複抽題</span>
                        </div>
                    </button>
                    <button class="menu-btn" onclick="window.setLevel(6, this)">
                        <span style="font-size: 1.4rem;">🌙</span>
                        <div class="btn-info">
                            <span class="btn-title">深夜版</span>
                            <span class="btn-desc">分類內不重複抽題</span>
                        </div>
                    </button>
                </div>
                <button
                    style="width:100%; background:none; border:none; color:#ccc; margin-top:35px; font-size:0.85rem; cursor:pointer;"
                    onclick="window.toggleMenu()">返回</button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'deepTalkProgressV3';

        const allQuestions = [
            ["你認為人生最重要的是什麼？為什麼？", "如果只能選一個：自由、金錢、愛、成就，你選哪個？", "你最不能接受的價值觀是什麼？", "你覺得伴侶和你價值觀不同，能走多遠？", "你覺得誠實和善良哪個更重要？", "你會為現實放棄理想嗎？", "你最重視『被理解』還是『被尊重』？", "你覺得一個人最大的成熟是什麼？", "你認為幸福是一種能力，還是一種運氣？", "你覺得人可以完全相信另一個人嗎？"],
            ["你在愛裡最害怕的是什麼？", "你會為了愛改變自己嗎？", "你覺得安全感應該自己給還是對方給？", "你需要每天聯絡嗎？", "你怎麼定義背叛？", "你可以接受曖昧多久？", "你比較容易主動還是等待？", "當你喜歡一個人時，最明顯的表現是什麼？", "你最無法接受伴侶忽略你的哪種感受？", "你相信長久關係需要激情還是穩定？"],
            ["你工作是為了錢還是成就感？", "你願意為升遷犧牲多少？", "你可以接受不喜歡的工作多久？", "你有野心嗎？多大？", "你羨慕別人成功時會怎麼想？", "你最害怕一輩子平凡嗎？", "你會把工作擺在人生第一順位嗎？", "你認為努力和運氣哪個更重要？", "你想成為被需要的人，還是不可取代的人？", "如果現在失去工作，你最先擔心的是什麼？"],
            ["你最不想被別人知道的弱點是？", "你曾經最自卑的是什麼？", "你最害怕被拋棄嗎？", "你有討厭過自己嗎？", "你最後悔的一件事？", "你最難原諒自己的地方是什麼？", "你通常用什麼方式保護自己？", "你有過表面沒事、其實很痛的時候嗎？", "你最容易在哪種關係裡失去自己？", "你有沒有一個從沒真正放下的人或事？"],
            ["你相信靈魂伴侶嗎？", "你覺得自己活得真實嗎？", "你最想成為什麼樣的人？", "你覺得人生有意義嗎？", "你想被怎樣記住？", "你有恐懼死亡嗎？", "你認為一個人怎樣才算真正自由？", "你覺得孤獨是缺陷還是禮物？", "你曾經有哪一刻覺得自己真正活著？", "你覺得愛一個人，到底是在愛對方，還是在照見自己？"],
            ["在朋友關係裡，你最害怕被誤解的是哪一點？", "你在群體裡通常會隱藏哪一面自己？", "你覺得自己在人際關係中最大的盲點是什麼？", "你最不能接受朋友怎麼對你？", "你通常是維持關係的人，還是等別人靠近的人？", "你有沒有曾經在人前很會說話，私下卻覺得很空？", "你覺得有些朋友其實只是階段性的嗎？", "你最欣賞哪一種成熟的大人感？", "你在人群裡最常戴上的面具是什麼？", "你會為了融入一段關係而委屈自己嗎？"],
            ["你有沒有曾經因為朋友的一句話偷偷難過？", "你最害怕在友情裡失去的是什麼？", "你有有沒有曾經覺得自己其實不夠被重視？", "你其實最希望別人怎麼理解你？", "你有過一段已經不聯絡，卻一直放在心裡的關係嗎？", "你最害怕深夜時突然想起誰？", "你會在低潮時主動求助嗎？", "你比較怕孤單，還是怕沒有人真的懂你？", "你最常在夜深時反覆想起的遺憾是什麼？", "你有沒有曾經明明很想念，卻不敢打擾的人？"]
        ];

        const themes = [
            { name: "價值對談", logic: "決策邏輯、底層作業系統", icon: "🍃" },
            { name: "親密情感", logic: "依附模式、安全感來源", icon: "✨" },
            { name: "成長野心", logic: "自我價值來源、動機", icon: "🕊️" },
            { name: "內在脆弱", logic: "陰影、防衛機制", icon: "🌙" },
            { name: "靈魂層次", logic: "生命目標、成熟度", icon: "🪐" },
            { name: "成熟社交", logic: "社會面具與真實自我", icon: "🕯️" },
            { name: "深夜版", logic: "失落與依賴", icon: "☁️" }
        ];

        let currentLevel = -1;
        let isFlipping = false;
        let progressState = createFreshProgressState();
        let drawHistory = [];

        function shuffle(array) {
            const result = [...array];
            for (let i = result.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [result[i], result[j]] = [result[j], result[i]];
            }
            return result;
        }

        function createRandomDeck() {
            return shuffle(
                allQuestions.flatMap((questions, themeIndex) =>
                    questions.map((question, questionIndex) => ({ themeIndex, questionIndex, question }))
                )
            );
        }

        function createLevelDeck(levelIndex) {
            return shuffle(
                allQuestions[levelIndex].map((question, questionIndex) => ({ themeIndex: levelIndex, questionIndex, question }))
            );
        }

        function createFreshProgressState() {
            return {
                randomDeck: createRandomDeck(),
                levelDecks: allQuestions.map((_, index) => createLevelDeck(index))
            };
        }

        function saveProgress() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(progressState));
        }

        function isValidCard(card) {
            return card
                && Number.isInteger(card.themeIndex)
                && Number.isInteger(card.questionIndex)
                && allQuestions[card.themeIndex]
                && allQuestions[card.themeIndex][card.questionIndex] === card.question;
        }

        function validateDeck(deck, expectedThemeIndex = null) {
            return Array.isArray(deck)
                && deck.every(card => {
                    if (!isValidCard(card)) return false;
                    if (expectedThemeIndex !== null && card.themeIndex !== expectedThemeIndex) return false;
                    return true;
                });
        }

        function loadProgress() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) {
                    progressState = createFreshProgressState();
                    saveProgress();
                    return;
                }

                const parsed = JSON.parse(raw);
                const randomDeck = validateDeck(parsed.randomDeck) ? parsed.randomDeck : createRandomDeck();
                const levelDecks = allQuestions.map((_, index) => {
                    const savedDeck = parsed.levelDecks && parsed.levelDecks[index];
                    return validateDeck(savedDeck, index) ? savedDeck : createLevelDeck(index);
                });

                progressState = { randomDeck, levelDecks };
                saveProgress();
            } catch (error) {
                progressState = createFreshProgressState();
                saveProgress();
            }
        }

        function getRemainingCount(level) {
            return level === -1
                ? progressState.randomDeck.length
                : progressState.levelDecks[level].length;
        }

        function getTotalCount(level) {
            return level === -1
                ? allQuestions.reduce((sum, questions) => sum + questions.length, 0)
                : allQuestions[level].length;
        }

        function setNotice(message = '') {
            document.getElementById('noticeText').innerText = message;
        }

        function updatePrevButton() {
            document.getElementById('prevBtn').disabled = drawHistory.length <= 1;
        }

        function updateProgressText() {
            const progressText = document.getElementById('progressText');
            const total = getTotalCount(currentLevel);
            const remaining = getRemainingCount(currentLevel);
            const used = total - remaining;

            if (currentLevel === -1) {
                progressText.innerText = `隨心而遇進度：已抽 ${used} / ${total} 題，剩餘 ${remaining} 題`;
            } else {
                progressText.innerText = `${themes[currentLevel].name}：已抽 ${used} / ${total} 題，剩餘 ${remaining} 題`;
            }
        }

        function getNextCardForLevel(level) {
            let reshuffled = false;
            let card;

            if (level === -1) {
                if (progressState.randomDeck.length === 0) {
                    progressState.randomDeck = createRandomDeck();
                    reshuffled = true;
                }
                card = progressState.randomDeck.pop();
            } else {
                if (progressState.levelDecks[level].length === 0) {
                    progressState.levelDecks[level] = createLevelDeck(level);
                    reshuffled = true;
                }
                card = progressState.levelDecks[level].pop();
            }

            saveProgress();
            return { card, reshuffled };
        }

        function updateLevelDisplay(level, drawnThemeIndex = null) {
            if (level === -1) {
                if (drawnThemeIndex === null) {
                    document.getElementById('levelName').innerText = '隨心而遇';
                    document.getElementById('levelLogic').innerText = '全題庫不重複抽題，抽完才重洗';
                } else {
                    document.getElementById('levelName').innerText = `${themes[drawnThemeIndex].name} · 隨心而遇`;
                    document.getElementById('levelLogic').innerText = '全題庫不重複抽題，重開頁面也會保留進度';
                }
            } else {
                document.getElementById('levelName').innerText = themes[level].name;
                document.getElementById('levelLogic').innerText = `${themes[level].logic}｜分類內不重複抽題`;
            }
        }

        function renderCard(card, modeLevel) {
            const cardBack = document.getElementById('cardBack');
            cardBack.className = 'card-face card-back theme-' + card.themeIndex;
            document.getElementById('backIcon').innerText = themes[card.themeIndex].icon;
            document.getElementById('questionText').innerText = card.question;
            updateLevelDisplay(modeLevel, card.themeIndex);
            updateProgressText();
            updatePrevButton();
        }

        window.toggleMenu = function () {
            document.getElementById('menuOverlay').classList.toggle('open');
        }

        window.setLevel = function (lv, btn) {
            currentLevel = lv;
            drawHistory = [];
            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            updateLevelDisplay(lv);
            updateProgressText();
            updatePrevButton();
            setNotice('');
            window.toggleMenu();
            window.drawQuestion();
        }

        window.drawQuestion = function () {
            if (isFlipping) return;
            isFlipping = true;
            setNotice('');

            const cardElement = document.getElementById('cardElement');
            const { card, reshuffled } = getNextCardForLevel(currentLevel);

            drawHistory.push({ ...card, modeLevel: currentLevel });
            cardElement.classList.add('is-flipped');

            setTimeout(() => {
                renderCard(card, currentLevel);

                if (reshuffled) {
                    setNotice(currentLevel === -1
                        ? '全題庫已抽完，已自動重新洗牌開始新一輪。'
                        : `${themes[currentLevel].name} 題庫已抽完，已自動重新洗牌開始新一輪。`);
                }

                cardElement.classList.remove('is-flipped');
                setTimeout(() => { isFlipping = false; }, 850);
            }, 400);
        }

        window.showPreviousQuestion = function () {
            if (isFlipping || drawHistory.length <= 1) return;

            setNotice('你正在查看上一題；題庫進度不會回退。');
            drawHistory.pop();
            const previousCard = drawHistory[drawHistory.length - 1];
            renderCard(previousCard, previousCard.modeLevel);
        }

        window.resetProgress = function () {
            const confirmed = window.confirm('要重置所有抽題進度嗎？重置後會忘記目前所有已抽過的題目，重新開始。');
            if (!confirmed) return;

            progressState = createFreshProgressState();
            drawHistory = [];
            saveProgress();
            updateLevelDisplay(currentLevel);
            updateProgressText();
            updatePrevButton();
            setNotice('已重置所有抽題進度。');
            document.getElementById('questionText').innerHTML = '進度已重置<br>輕觸卡牌重新開始';
            document.getElementById('backIcon').innerText = '🕯️';
            document.getElementById('cardBack').className = 'card-face card-back theme-rand';
        }

        loadProgress();
        updateLevelDisplay(currentLevel);
        updateProgressText();
        updatePrevButton();
        setNotice('');
    </script>
</body>

</html>
